  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== 加载动画 ========== -->
  <div class="loading">
    <div class="loading__bar"></div>
    <div class="loading__text">🫐 先斗寧</div>
  </div>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-emoji">🫐</span>
      <span class="brand-gradient">先斗寧</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">🏠 角色介绍</a></li>
      <li><a href="videos.html">🎬 视频档案</a></li>

      <li><a href="collection.html">📦 我的图鉴</a></li>
    </ul>
  </nav>

  <!-- ========== 页面主体 ========== -->
  <div class="archive-page">
    <section class="section">
      <h2 class="section-title">🐦 推文<span class="accent">整理</span></h2>
      <p class="section-subtitle">TWEET ARCHIVE</p>
      <div class="section-dots">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- X 官方时间线嵌入 -->
      <div class="twitter-embed-wrapper">
        <a class="twitter-timeline"
           href="https://x.com/ponto_nei"
           data-theme="light"
           data-height="800"
           data-chrome="nofooter noborders transparent"
           data-lang="ja"
           data-dnt="true">
          @ponto_nei のポストを読み込み中...
        </a>
      </div>

  </div>

  <!-- ========== 页脚 ========== -->

    <p>
      🫐 先斗寧 (Ponto Nei) © <a href="https://www.nijisanji.jp/" target="_blank" rel="noopener">ANYCOLOR Inc.</a>
      &nbsp;|&nbsp; X (Twitter): <a href="https://twitter.com/ponto_nei" target="_blank" rel="noopener">@ponto_nei</a>
    </p>
    <p style="margin-top:0.5rem;font-size:0.78rem;">
      本站为粉丝自制页面，与 ANYCOLOR 官方无关。
    </p>
  </footer>

  <!-- X 官方时间线嵌入 -->
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

  <!-- ========== 加载动画控制 ========== -->
  <script>
    (function() {
      var loading = document.querySelector('.loading');
      if (!loading) return;
      document.body.classList.add('is-noscroll');
      window.addEventListener('load', function() {
        setTimeout(function() {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }, 600);
      });
      setTimeout(function() {
        if (!loading.classList.contains('is-hidden')) {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }
      }, 4000);
    })();
  </script>
</body>
</html>
