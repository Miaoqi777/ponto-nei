<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>推文整理 | 先斗寧 (Ponto Nei)</title>
  <meta name="description" content="先斗寧（Ponto Nei）的X（Twitter）推文整理 — 直播预告、联动转发、视频预告、日常推文等。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫐</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== 加载动画 ========== -->
  <div class="loading">
    <div class="loading__bar"></div>
    <div class="loading__text">🫐 先斗寧</div>
  </div>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-emoji">🫐</span>
      <span class="brand-gradient">先斗寧</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">🏠 角色介绍</a></li>
      <li><a href="videos.html">🎬 视频档案</a></li>
      <li><a href="tweets.html">🐦 推文整理</a></li>
      <li><a href="collection.html">📦 我的图鉴</a></li>
    </ul>
  </nav>

  <!-- ========== 页面主体 ========== -->
  <div class="archive-page">
    <section class="section">
      <h2 class="section-title">🐦 推文<span class="accent">整理</span></h2>
      <p class="section-subtitle">TWEET ARCHIVE</p>
      <div class="section-dots">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- 分类过滤标签 -->
      <div id="filter-bar" class="filter-bar">
        <!-- JS 动态渲染 -->
      </div>

      <!-- 元信息栏 -->
      <div class="archive-meta">
        <span class="updated" id="archive-updated">最終更新: 読み込み中...</span>
        <span class="meta-spacer"></span>
        <button class="search-toggle" id="manual-toggle">✏️ 手动添加</button>
        <span class="count-badge" id="archive-count">共 0 条推文</span>
      </div>

      <!-- 手动添加面板 -->
      <div class="search-body" id="manual-body">
        <form id="manual-form" class="manual-form">
          <div class="search-row">
            <label class="search-label" for="manual-url">推文链接</label>
            <input type="url" class="search-input" id="manual-url"
                   placeholder="https://x.com/ponto_nei/status/123456...">
          </div>
          <div class="search-row">
            <label class="search-label" for="manual-text">正文</label>
            <textarea class="search-input" id="manual-text" rows="3"
                      placeholder="粘贴推文内容..."></textarea>
          </div>
          <div class="search-row">
            <label class="search-label" for="manual-date">日期</label>
            <input type="date" class="search-date-input" id="manual-date">
            <label class="search-label" for="manual-category" style="margin-left:1rem;">分类</label>
            <select class="search-date-select" id="manual-category">
              <option value="日常推文">💬 日常推文</option>
              <option value="直播预告">📡 直播预告</option>
              <option value="视频和短视频预告">🎬 视频/短视频预告</option>
            </select>
          </div>
          <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
            <button type="submit" class="btn-submit">✅ 添加推文</button>
            <button type="button" class="btn-outline-sm" id="manual-export">📋 导出数据</button>
          </div>
        </form>
      </div>

      <!-- 推文卡片列表 -->
      <div id="tweet-grid" class="tweet-grid">
        <!-- JS 动态渲染 -->
      </div>
    </section>
  </div>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p>
      🫐 先斗寧 (Ponto Nei) © <a href="https://www.nijisanji.jp/" target="_blank" rel="noopener">ANYCOLOR Inc.</a>
      &nbsp;|&nbsp; X (Twitter): <a href="https://twitter.com/ponto_nei" target="_blank" rel="noopener">@ponto_nei</a>
    </p>
    <p style="margin-top:0.5rem;font-size:0.78rem;">
      本站为粉丝自制页面，与 ANYCOLOR 官方无关。
    </p>
  </footer>

  <script src="js/tweets.js?v=2"></script>

  <!-- ========== 加载动画控制 ========== -->
  <script>
    (function() {
      var loading = document.querySelector('.loading');
      if (!loading) return;
      document.body.classList.add('is-noscroll');
      window.addEventListener('load', function() {
        setTimeout(function() {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }, 600);
      });
      setTimeout(function() {
        if (!loading.classList.contains('is-hidden')) {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }
      }, 4000);
    })();
  </script>
</body>
</html>
