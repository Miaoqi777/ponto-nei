<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频档案 | 先斗寧 (Ponto Nei)</title>
  <meta name="description" content="先斗寧（Ponto Nei）的YouTube视频档案 — 录播、视频、短视频、联动等分类整理。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫐</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== 加载动画 ========== -->
  <div class="loading">
    <div class="loading__bar"></div>
    <div class="loading__text">🫐 先斗寧</div>
  </div>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-emoji">🫐</span>
      <span class="brand-gradient">先斗寧</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">🏠 角色介绍</a></li>
      <li><a href="videos.html">🎬 视频档案</a></li>
      <li><a href="tweets.html">🐦 推文整理</a></li>
      <li><a href="collection.html">📦 我的图鉴</a></li>
    </ul>
  </nav>

  <!-- ========== 页面主体 ========== -->
  <div class="archive-page">
    <section class="section">
      <h2 class="section-title">🎬 视频<span class="accent">档案</span></h2>
      <p class="section-subtitle">VIDEO ARCHIVE</p>
      <div class="section-dots">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>

      <!-- 分类过滤标签 -->
      <div id="filter-bar" class="filter-bar">
        <!-- JS 动态渲染 -->
      </div>

      <!-- 元信息栏 -->
      <div class="archive-meta">
        <span class="updated" id="archive-updated">最終更新: 読み込み中...</span>
        <span class="count-badge" id="archive-count">共 0 个视频</span>
      </div>

      <!-- 视频卡片网格 -->
      <div id="video-grid" class="video-grid">
        <!-- JS 动态渲染 -->
      </div>
    </section>
  </div>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p>
      🫐 先斗寧 (Ponto Nei) © <a href="https://www.nijisanji.jp/" target="_blank" rel="noopener">ANYCOLOR Inc.</a>
      &nbsp;|&nbsp; 视频数据来自 YouTube Data API
    </p>
    <p style="margin-top:0.5rem;font-size:0.78rem;">
      本站为粉丝自制页面，与 ANYCOLOR 官方无关。视频版权归原作者所有。
    </p>
  </footer>

  <script src="js/videos.js"></script>

  <!-- ========== 加载动画控制 ========== -->
  <script>
    (function() {
      var loading = document.querySelector('.loading');
      if (!loading) return;
      document.body.classList.add('is-noscroll');
      window.addEventListener('load', function() {
        setTimeout(function() {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }, 600);
      });
      setTimeout(function() {
        if (!loading.classList.contains('is-hidden')) {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }
      }, 4000);
    })();
  </script>
</body>
</html>
