<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的图鉴 | 先斗寧 (Ponto Nei)</title>
  <meta name="description" content="先斗寧商品图鉴管理 — 上传图片、记录价格、管理数量、保存购买链接。">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫐</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== 加载动画 ========== -->
  <div class="loading">
    <div class="loading__bar"></div>
    <div class="loading__text">🫐 先斗寧</div>
  </div>

  <!-- ========== 导航栏 ========== -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <span class="brand-emoji">🫐</span>
      <span class="brand-gradient">先斗寧</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">🏠 角色介绍</a></li>
      <li><a href="videos.html">🎬 视频档案</a></li>
      <li><a href="tweets.html">🐦 推文整理</a></li>
      <li><a href="collection.html">📦 我的图鉴</a></li>
    </ul>
    <div id="nav-auth"></div>
  </nav>

  <!-- ========== 迁移提示条 ========== -->
  <div id="migrate-banner" class="migrate-banner" style="display:none;">
    <span id="migrate-text"></span>
    <button class="btn-migrate" onclick="doMigrate()">📥 迁移</button>
    <button class="btn-dismiss" onclick="doDismissMigration()">✕ 忽略</button>
  </div>

  <!-- ========== 页面容器 ========== -->
  <div class="page-container">

    <!-- 添加商品表单 -->
    <section class="form-section">
      <div class="card form-card">
        <h2>📝 添加商品到图鉴</h2>
        <form id="add-form">
          <!-- 隐藏字段：编辑模式 ID -->
          <input type="hidden" id="edit-id" value="">

          <div class="form-grid">
            <!-- 图片上传 -->
            <div class="form-group">
              <label>📷 商品图片</label>
              <input type="file" id="item-image" accept="image/*">
              <div class="image-preview" id="image-preview">
                <span class="placeholder">图片预览</span>
              </div>
            </div>

            <!-- 商品名称 -->
            <div class="form-group">
              <label>🏷️ 商品名称 <span style="color:#FF6B6B;">*</span></label>
              <input type="text" id="item-name" placeholder="例：先斗寧 生日纪念亚克力立牌" required>
            </div>

            <!-- 价格 -->
            <div class="form-group">
              <label>💰 价格（日元 ¥） <span style="color:#FF6B6B;">*</span></label>
              <input type="number" id="item-price" placeholder="例：2000" min="0" step="1" required>
            </div>

            <!-- 数量 -->
            <div class="form-group">
              <label>📦 持有数量 <span style="color:#FF6B6B;">*</span></label>
              <input type="number" id="item-quantity" placeholder="例：1" min="1" step="1" value="1" required>
            </div>

            <!-- 购买链接 -->
            <div class="form-group full">
              <label>🔗 购买链接</label>
              <input type="url" id="item-link" placeholder="例：https://shop.nijisanji.jp/...">
            </div>

            <!-- 备注 -->
            <div class="form-group full">
              <label>💬 备注</label>
              <textarea id="item-note" placeholder="例：2023年生日限定、会场限定等..." rows="2"></textarea>
            </div>
          </div>

          <!-- 按钮 -->
          <div class="form-actions">
            <button type="submit" class="btn-arrow" id="submit-btn">添加到图鉴</button>
            <button type="button" class="btn-secondary" id="cancel-btn" onclick="resetFormDirect()">🔄 重置表单</button>
          </div>
        </form>
      </div>
    </section>

    <!-- 图鉴展示区 -->
    <section>
      <!-- 控制栏 -->
      <div class="collection-controls">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="搜索商品名称或备注...">
        </div>
        <select class="sort-select" id="sort-select">
          <option value="newest">🕐 最新添加</option>
          <option value="name">🔤 名称排序</option>
          <option value="price-asc">💰 价格从低到高</option>
          <option value="price-desc">💎 价格从高到低</option>
        </select>
        <span class="count-badge" id="collection-count">共 0 件商品</span>
      </div>

      <!-- 图鉴网格 -->
      <div class="collection-grid" id="collection-grid">
        <!-- JS 动态渲染 -->
      </div>
    </section>

  </div>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <p>
      🫐 先斗寧 (Ponto Nei) © <a href="https://www.nijisanji.jp/" target="_blank" rel="noopener">ANYCOLOR Inc.</a>
      &nbsp;|&nbsp; 商品数据存储在本地浏览器中
    </p>
    <p style="margin-top:0.5rem;font-size:0.78rem;">
      本站为粉丝自制页面，与 ANYCOLOR 官方无关。
    </p>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/collection.js"></script>

  <!-- ========== 登录弹窗 ========== -->
  <div class="auth-overlay" id="auth-overlay">
    <div class="auth-card">
      <button class="auth-close" onclick="hideAuthModal()">✕</button>
      <div class="auth-card-logo">🫐</div>
      <div class="auth-card-title">欢迎来到 <span>先斗寧</span> 粉丝站</div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">🔑 登录</button>
        <button class="auth-tab" data-tab="register">📝 注册</button>
      </div>
      <form class="auth-form active" data-tab="login" id="login-form">
        <div class="auth-field">
          <label>用户名</label>
          <input type="text" id="login-username" placeholder="输入用户名" required autocomplete="username">
        </div>
        <div class="auth-field">
          <label>密码</label>
          <input type="password" id="login-password" placeholder="输入密码" required autocomplete="current-password">
        </div>
        <div class="auth-error" id="login-error"></div>
        <button type="submit" class="auth-submit">登录</button>
      </form>
      <form class="auth-form" data-tab="register" id="register-form">
        <div class="auth-field">
          <label>用户名</label>
          <input type="text" id="register-username" placeholder="3-20个字符，中文/英文/数字" required autocomplete="username">
        </div>
        <div class="auth-field">
          <label>密码</label>
          <input type="password" id="register-password" placeholder="至少6位" required autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label>确认密码</label>
          <input type="password" id="register-password-confirm" placeholder="再次输入密码" required autocomplete="new-password">
        </div>
        <div class="auth-error" id="register-error"></div>
        <button type="submit" class="auth-submit">注册</button>
      </form>
      <p class="auth-hint">🔒 数据保存在你的浏览器中，不会上传到服务器</p>
    </div>
  </div>

  <!-- ========== 加载动画控制 ========== -->
  <script>
    (function() {
      var loading = document.querySelector('.loading');
      if (!loading) return;
      document.body.classList.add('is-noscroll');
      window.addEventListener('load', function() {
        setTimeout(function() {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }, 600);
      });
      setTimeout(function() {
        if (!loading.classList.contains('is-hidden')) {
          loading.classList.add('is-hidden');
          document.body.classList.remove('is-noscroll');
        }
      }, 4000);
    })();
  </script>

  <!-- ========== 内联脚本：重置按钮（需要直接访问 DOM） ========== -->
  <script>
    // 表单取消按钮的回调
    function resetFormDirect() {
      document.getElementById('add-form').reset();
      document.getElementById('edit-id').value = '';
      const preview = document.getElementById('image-preview');
      if (preview) {
        preview.innerHTML = '<span class="placeholder">图片预览</span>';
        preview.classList.remove('has-image');
      }
      document.getElementById('submit-btn').textContent = '添加到图鉴';
    }
  </script>
</body>
</html>
